# Local, production-shaped stack: Postgres + Redis + the service.
# Migrations run once (via the `migrate` service) before the app starts.
# Credentials here are local-only; real environments use a secrets manager.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkr
      POSTGRES_PASSWORD: linkr
      POSTGRES_DB: linkr
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkr"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      LINKR_DATABASE_URL: postgresql+psycopg://linkr:linkr@postgres:5432/linkr
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports: ["8000:8000"]
    environment:
      LINKR_ENV: production
      LINKR_DATABASE_URL: postgresql+psycopg://linkr:linkr@postgres:5432/linkr
      LINKR_REDIS_URL: redis://redis:6379/0
      LINKR_BASE_URL: http://localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
