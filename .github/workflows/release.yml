name: Release and Deploy

# main  -> build, scan, publish image, deploy to staging.
# tag v* -> same, then deploy to production (gated) and cut a GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  # GHCR image names must be lowercase.
  IMAGE: ghcr.io/cedriccloudops/linkr

jobs:
  build:
    name: Build, scan, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Scan published image (report-only)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          "$RUNNER_TEMP/bin/trivy" image --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 0 --no-progress "$IMAGE:sha-${{ github.sha }}"
      - name: Generate SBOM (SPDX)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"
          "$RUNNER_TEMP/bin/syft" "$IMAGE:sha-${{ github.sha }}" \
            -o spdx-json > sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check cluster access is configured
        id: gate
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::KUBECONFIG secret not set; skipping cluster deploy."
          fi
      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4
      - name: Deploy to staging
        if: steps.gate.outputs.enabled == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          kubectl apply -k deploy/kubernetes/overlays/staging
          kubectl -n linkr-staging set image deployment/linkr \
            app=${{ env.IMAGE }}:sha-${{ github.sha }}
          kubectl -n linkr-staging rollout status deployment/linkr --timeout=180s

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: production   # requires a manual approval configured on the environment
    steps:
      - name: Check cluster access is configured
        id: gate
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::KUBECONFIG secret not set; skipping cluster deploy."
          fi
      - if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4
      - name: Deploy to production
        if: steps.gate.outputs.enabled == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          kubectl apply -k deploy/kubernetes/overlays/production
          kubectl -n linkr set image deployment/linkr \
            app=${{ env.IMAGE }}:${GITHUB_REF_NAME#v}
          kubectl -n linkr rollout status deployment/linkr --timeout=180s

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sbom
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom.spdx.json
