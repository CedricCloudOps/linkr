name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, SAST, dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: bandit -q -r src -c pyproject.toml
      - name: Dependency audit (informational)
        # Surfaces advisories for triage. Transitive findings without a
        # compatible fixed release do not block the pipeline.
        continue-on-error: true
        run: pip-audit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest
      - if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  migrations:
    name: Migrations (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: linkr
          POSTGRES_PASSWORD: linkr
          POSTGRES_DB: linkr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U linkr"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      LINKR_DATABASE_URL: postgresql+psycopg://linkr:linkr@localhost:5432/linkr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Apply and revert migrations
        run: |
          alembic upgrade head
          alembic downgrade base

  image:
    name: Build image and scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: linkr:ci
      - name: Vulnerability scan (report-only)
        # Reports fixable HIGH/CRITICAL findings without failing the build on
        # base-image CVEs. Set exit-code to "1" to enforce a hard gate.
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          image-ref: linkr:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
