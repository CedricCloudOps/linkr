# Requires the External Secrets Operator and a configured AWS SecretStore.
# Syncs DATABASE_URL / REDIS_URL from AWS Secrets Manager into a Kubernetes
# Secret named linkr-secrets. No credentials are ever committed to git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkr-secrets
  labels:
    app.kubernetes.io/name: linkr
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: linkr-secrets
    creationPolicy: Owner
  data:
    - secretKey: LINKR_DATABASE_URL
      remoteRef:
        key: linkr/database-url
    - secretKey: LINKR_REDIS_URL
      remoteRef:
        key: linkr/redis-url
