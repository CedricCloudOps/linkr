apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkr
spec:
  tls:
    - hosts:
        - stg.lnkr.dev
      secretName: linkr-tls
  rules:
    - host: stg.lnkr.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linkr
                port:
                  number: 80
