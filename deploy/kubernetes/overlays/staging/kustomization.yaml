apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: linkr-staging

resources:
  - namespace.yaml
  - ../../base

configMapGenerator:
  - name: linkr-config
    behavior: merge
    literals:
      - LINKR_ENV=staging
      - LINKR_BASE_URL=https://stg.lnkr.dev

patches:
  - path: replicas.yaml
  - path: ingress-host.yaml
